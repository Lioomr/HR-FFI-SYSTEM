services:
  db:
    image: postgres:16-alpine
    container_name: ffi_hr_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ffi_hr_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ffi_hr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    container_name: ffi_hr_backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env.docker
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ffi_hr_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./FrontEnd
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: ffi_hr_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
