services:
  db:
    image: postgres:16-alpine
    container_name: ffi_hr_db_prod
    restart: always
    env_file:
      - ./Backend/.env.production
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    container_name: ffi_hr_backend_prod
    restart: always
    env_file:
      - ./Backend/.env.production
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./FrontEnd
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: ffi_hr_frontend_prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data_prod:
